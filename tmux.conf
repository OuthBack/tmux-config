# Color
set-option -sa terminal-overrides ",xterm*:Tc"

# Clipboard
set -g allow-passthrough on
set -as terminal-features ',tmux-256color:clipboard'

# Bindins
set-option -g prefix M-,
## vim-like pane switching
bind -r ^ last-window
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

## Fuzzy find directories
bind-key C-f run-shell -b "~/.config/tmux/scripts/fuzzy-find.sh" 

# set vi-mode
set-window-option -g mode-keys vi
# keybindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# does not log in when start tmux
set -g default-command "${SHELL}"

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on
set-option -g update-environment "WAYLAND_DISPLAY"

# List of plugins
set -g @tpm_plugins '           \
   tmux-plugins/tpm             \
   tmux-plugins/tmux-sensible   \
   tmux-plugins/tmux-resurrect  \
   sainnhe/tmux-fzf             \
   tmux-plugins/tmux-yank       \
   loichyan/tmux-toggle-popup   \
   tmux-plugins/tmux-continuum  \
'

set -g @resurrect-strategy-nvim 'session'
set -g  @popup-autostart on

set -g @continuum-restore on
set -g @continuum-boot on

# Open in same window
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Pop ups
set -g @popup-on-init {
    set exit-empty off
    set status off
    set -g mode-keys vi
    set -g copy-command 'wl-copy'
    bind-key -T copy-mode-vi v send-keys -X begin-selection
    bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
    bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'wl-copy --trim-newline'
}

set -g @popup-id-format '#{session_name}/#{b:pane_current_path}/{popup_name}'
bind -n C-M-g   run "#{@popup-toggle} --name=lazygit   --toggle-key '-n C-M-g' -eWAYLAND_DISPLAY='##{WAYLAND_DISPLAY}'  -w80% -h80% -Ed'##{pane_current_path}' lazygit"
bind -n C-M-t   run "#{@popup-toggle} --name=terminal  --toggle-key '-n C-M-t' -eWAYLAND_DISPLAY='##{WAYLAND_DISPLAY}'  -w80% -h80% -Ed'##{pane_current_path}' zsh"
bind -n C-M-a   run "#{@popup-toggle} --name=AI        --toggle-key '-n C-M-a' -eWAYLAND_DISPLAY='##{WAYLAND_DISPLAY}'  -w80% -h80% -Ed'##{pane_current_path}' zsh -c 'devcontainer exec --workspace-folder . --remote-env REMOTE_CONTAINERS=1 /bin/zsh -c gemini --yolo'"
bind -n C-M-n   run "#{@popup-toggle} --name=notes     --toggle-key '-n C-M-n' -eWAYLAND_DISPLAY='##{WAYLAND_DISPLAY}'  -w80% -h80% -Ed'##{pane_current_path}' zsh -c nvim /tmp/notes.md"
# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'
